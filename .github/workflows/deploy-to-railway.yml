name: Deploy to Railway

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest
      
      - name: Login to Railway
        run: |
          if [ -n "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "Logging into Railway..."
            railway login --token ${{ secrets.RAILWAY_TOKEN }}
          else
            echo "No RAILWAY_TOKEN secret found, skipping login"
          fi
      
      - name: Link to Project
        run: |
          railway link --project fda2073b-d325-4734-8dd6-20deb81eb585
      
      - name: Deploy to Railway
        run: |
          railway up --detach
      
      - name: Get Deployment URL
        id: deploy-url
        run: |
          URL=$(railway variables get PUBLIC_URL 2>/dev/null || echo "")
          if [ -z "$URL" ]; then
            # Try to get the service URL
            SERVICE_INFO=$(railway status --json 2>/dev/null || echo '{}')
            echo "Service info: $SERVICE_INFO"
          fi
          echo "deployment_complete=true" >> $GITHUB_OUTPUT
      
      - name: Notify Deployment Status
        run: |
          echo "✅ Deployment triggered to Railway project fda2073b-d325-4734-8dd6-20deb81eb585"
          echo "📝 Check Railway dashboard for status: https://railway.app/project/fda2073b-d325-4734-8dd6-20deb81eb585"
