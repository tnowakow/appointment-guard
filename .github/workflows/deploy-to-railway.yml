name: Deploy to Railway

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: railwayapp/deploy-to-railway@v1.0.2
        with:
          project-name: "appointment-guard"
          token: ${{ secrets.RAILWAY_TOKEN }}
