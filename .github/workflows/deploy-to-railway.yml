# Railway Deployment Workflow
# DISABLED - Use Railway native GitHub integration instead
# To enable: Connect repo at https://railway.app/project/fda2073b-d325-4734-8dd6-20deb81eb585/settings/github

name: Deploy to Railway

# TEMPORARILY ENABLED FOR TESTING - RAILWAY_TOKEN may be invalid
# If this fails, connect repo via Railway dashboard instead:
# https://railway.app/new/import (select tnowakow/appointment-guard)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Login to Railway
        run: |
          mkdir -p ~/.railway
          echo "${{ secrets.RAILWAY_TOKEN }}" > ~/.railway/auth.json
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Link to existing project
        run: railway link --project fda2073b-d325-4734-8dd6-20deb81eb585
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
