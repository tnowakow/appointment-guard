# Railway Deployment Workflow
# Use Railway native GitHub integration instead of this workflow
# Connect repo at: https://railway.app/new/import
# Select repository: tnowakow/appointment-guard

name: Deploy to Railway (Manual)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Deploy to Railway (via Docker)
        run: |
          echo "This workflow is kept for reference."
          echo "Railway deployment is now handled via native GitHub integration."
          echo "To deploy manually, visit: https://railway.app/new/import"
          echo "Select repository: tnowakow/appointment-guard"
        continue-on-error: true

      - name: Health Check (will fail until deployed)
        run: |
          echo "Checking health endpoint..."
          curl -s https://appointment-guard-production.up.railway.app/health || \
          echo "Note: App not yet deployed. Please create Railway project via dashboard."
