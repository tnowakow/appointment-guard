name: Deploy to Railway

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Notify Deployment
        run: |
          echo "🚀 Code pushed to Railway project"
          echo "Railway will auto-deploy when connected via GitHub integration"
          echo ""
          echo "To connect:"
          echo "1. Go to https://railway.app/new/connect"
          echo "2. Select repository: tnowakow/appointment-guard"
          echo "3. Add environment variables in Railway dashboard"
